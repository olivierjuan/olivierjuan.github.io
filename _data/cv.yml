    Projects:
      - name: Machine Learning for Discrete Optimization
        summary: I am interested in enhancing optimization methods with machine learning, specifically in the case of repeated optimization problem which arise in industrial applications. I am currently working on the development of a new method for learning to optimize combinatorial problems, which is based on the idea of learning a branching heuristics that can guide the search process of an optimization algorithm. This method has shown promising results on a variety of combinatorial problems, and I am currently working on further improving its performance and scalability. https://olivierjuan.github.io/mal-folio.github.io/projects/planbb/
        highlights:
          - Machine learning
          - Combinatorial Optimization
          - Branching Heuristics
          - Reinforcement Learning
          - Graph Neural Networks
        start_date: 2018-01-01

