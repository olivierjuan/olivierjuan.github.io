    Projects:
      - name: "PlanB&B — Model-Based RL for Branch-and-Bound"
        summary: >
          First model-based reinforcement learning agent for exact combinatorial optimization.
          PlanB&B learns an internal model of B&B dynamics and uses Monte Carlo Tree Search
          to discover branching strategies that surpass both imitation learning and prior RL baselines.
        url: https://olivierjuan.github.io/mal-folio.github.io/projects/planbb/
        highlights:
          - Model-based reinforcement learning
          - Monte Carlo Tree Search (Gumbel Search)
          - Mixed Integer Linear Programming
          - Graph Neural Networks
        start_date: 2023-01-01

      - name: "BBMDP — A Principled MDP for Variable Selection in B&B"
        summary: >
          Introduces a rigorous vanilla MDP formulation for the branching problem in B&B,
          removing theoretical limitations of prior TreeMDP approximations and enabling
          standard RL algorithms to learn optimal policies.
        url: https://olivierjuan.github.io/mal-folio.github.io/projects/bbmdp/
        highlights:
          - Markov Decision Processes
          - Deep Q-Network (DQN)
          - Branch & Bound
          - Combinatorial Optimization
        start_date: 2022-01-01

      - name: "Apogène — Short-Term Unit Commitment Software"
        summary: >
          Led the complete redesign and continuous development of EDF's flagship production
          scheduling software over more than a decade. Apogène V2 (2018) reduced overall
          power plant operating costs by several percent; awarded the IndusRO'2022 prize.
        url: https://www.youtube.com/watch?v=tBM6r-B8H8o&ab_channel=ROADEF
        highlights:
          - Short-term unit commitment
          - Mixed Integer Programming
          - Lagrangian decomposition & ADMM
          - Industrial software engineering
        start_date: 2012-01-01
