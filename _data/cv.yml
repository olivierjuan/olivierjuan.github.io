    Awards:
      - title: IndusRO'2022 Prize
        date: 2022-06-01
        awarder: ROADEF (French Society for Operations Research and Decision Aid)
        url: https://www.linkedin.com/feed/update/urn:li:activity:6962864243234742273/
        authors:
          - "ROADEF (French Society for Operations Research and Decision Aid)"
        summary: >
          Awarded to Apogène, EDF's short-term unit commitment software, in recognition of
          its industrial impact and the quality of the underlying operations research.

    Publications:
      - title: "Planning in Branch-and-Bound: Model-Based Reinforcement Learning for Exact Combinatorial Optimization"
        authors:
          - Paul Strang
          - Zacharie Alès
          - Côme Bissuel
          - Olivier Juan
          - Safia Kedad-Sidhoum
          - Emmanuel Rachelson
        publisher: "AAAI 2026"
        releaseDate: 2026-01-01
        url: https://openreview.net/forum?id=8481hfKVsr
        summary: >
          Introduces PlanB&B, the first model-based RL agent for exact combinatorial optimization,
          using MCTS over a learned B&B dynamics model to surpass prior RL and imitation learning baselines.

      - title: "A Markov Decision Process for Variable Selection in Branch & Bound"
        authors:
          - Paul Strang
          - Zacharie Alès
          - Côme Bissuel
          - Olivier Juan
          - Safia Kedad-Sidhoum
          - Emmanuel Rachelson
        publisher: "NeurIPS 2025"
        releaseDate: 2025-12-01
        url: https://openreview.net/forum?id=05Svr0k5C9
        summary: >
          Introduces BBMDP, a principled vanilla MDP formulation for variable selection in
          branch-and-bound, enabling standard RL algorithms to learn optimal branching policies.

      - title: "Reinforcement Learning for Variable Selection in a Branch and Bound Algorithm"
        authors:
          - Marc Ethève
          - Zacharie Alès
          - Côme Bissuel
          - Olivier Juan
          - Safia Kedad-Sidhoum
        publisher: "CPAIOR 2020"
        releaseDate: 2020-09-01
        url: https://doi.org/10.1007/978-3-030-58942-4_12
        summary: >
          Proposes FMSTS, the first RL approach to fully optimize the branching strategy in B&B,
          demonstrating strong generalization on new MILP instances.

      - title: "Using a Genetic Algorithm and CFD to Identify Low NOx Configurations in an Industrial Boiler"
        authors:
          - Sandro Dal Secco
          - Olivier Juan
          - Myriam Louis-Louisy
          - Jean-Yves Lucas
          - Pierre Plion
          - Lynda Porcheron
        publisher: "Fuel, Elsevier (vol. 158)"
        releaseDate: 2015-10-15
        url: https://doi.org/10.1016/j.fuel.2015.06.021
        summary: >
          Combines genetic algorithms with CFD simulations to minimize NOx emissions in a 600 MW
          tangentially-fired pulverized-coal boiler at EDF.

      - title: "Capacity Scaling for Graph Cuts in Vision"
        authors:
          - Olivier Juan
          - Yuri Boykov
        publisher: "ICCV 2007"
        releaseDate: 2007-10-01
        url: https://doi.org/10.1109/ICCV.2007.4408970
        summary: >
          Shows that capacity scaling — a classical technique from combinatorial optimization —
          significantly reduces the theoretical complexity of max-flow algorithms used in vision,
          yielding several-fold speed-ups on 3D and multi-label problems.

      - title: "Stochastic Motion and the Level Set Method in Computer Vision: Stochastic Active Contours"
        authors:
          - Olivier Juan
          - Renaud Keriven
          - Gheorghe Postelnicu
        publisher: "International Journal of Computer Vision (IJCV), vol. 69"
        releaseDate: 2006-07-01
        url: https://doi.org/10.1007/s11263-006-6849-5
        summary: >
          Introduces stochastic perturbations to the level set framework via Stratonovich differentials,
          enabling segmentation methods to escape local minima.

      - title: Active Graph Cuts
        authors:
          - Olivier Juan
          - Yuri Boykov
        publisher: "CVPR 2006"
        releaseDate: 2006-06-01
        url: https://doi.org/10.1109/CVPR.2006.47
        summary: >
          Introduces Active Cuts, a method that exploits good approximate solutions to accelerate
          global s/t cut computation, enabling near real-time performance for dynamic vision problems.

