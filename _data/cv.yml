    Experience:
      - company: EDF R&D — OSIRIS Department
        url: https://www.edf.fr/en/the-edf-group/innovating-for-the-future/rd-global-expertise/our-activities
        position: Research Engineer Expert
        location: Palaiseau, France
        start_date: 2019
        summary: >
          Leading research at the intersection of machine learning and combinatorial optimization,
          with applications to energy systems and smart EV charging. Co-authoring publications
          at top ML and OR venues (NeurIPS 2025, AAAI 2026).
        highlights:
          - Model-based reinforcement learning for branch-and-bound (PlanB&B — AAAI 2026)
          - Rigorous MDP formulation for variable selection in B&B (BBMDP — NeurIPS 2025)
