        location: Clamart, France
        start_date: 2015
        end_date: 2019
        summary: >
          Led the development of new optimization algorithms and mathematical formulations for
          the short-term unit commitment problem, and coordinated adaptation to new European
          balancing market rules.
        highlights:
          - Commissioning of Apogène V2 (2018) — reduced EDF power plant operating costs by several percent
          - Short-term unit commitment and Mixed Integer Programming
          - Lagrangian decomposition and ADMM
          - European electricity balancing market regulations

      - company: EDF R&D — OSIRIS Department
        url: https://www.edf.fr/en/the-edf-group/innovating-for-the-future/rd-global-expertise/our-activities
        position: Research Project Manager
        location: Clamart, France
        start_date: 2012
        end_date: 2015
        summary: >
          Managed the complete redesign and reimplementation of Apogée (EDF's legacy Fortran
          unit commitment solver) into a modern C++ codebase, with a full CI pipeline ensuring
          no regressions and significant improvements in solution quality and runtime.
        highlights:
          - Full C++ reimplementation of legacy Fortran code (Apogène V1 → V2)
          - Continuous integration and regression testing infrastructure
          - Mixed Integer Programming and Lagrangian decomposition
          - Team coordination across engineers and researchers

      - company: EDF R&D — OSIRIS Department
        url: https://www.edf.fr/en/the-edf-group/innovating-for-the-future/rd-global-expertise/our-activities
        position: Research Scientist
        location: Clamart, France
        start_date: 2008
        end_date: 2012
        summary: >
          Worked on a broad range of operational research topics before focusing on short-term
          unit commitment. Contributed to MIP formulations for hydraulic valley optimization
          and to early development of Apogène V1.
        highlights:
          - Task scheduling for maintenance planning
          - LNG terminal planning & scheduling
          - Coal power plant combustion and pollutant emission optimization (genetic algorithms + CFD)
          - Mixed Integer Programming for hydraulic valley optimization

