        summary: I managed a research project on the development of optimization algorithms for the short term unit commitment problem. In particular, I coordinated a team of engineers and developpers to do a complete reimplementation in C++ of a legacy Fortran code. I also contributed to the implementation of a CI ensuring no regression errors and showing significant improvements in terms of solution quality and computational time compared to existing methods.
        highlights:
